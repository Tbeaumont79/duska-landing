<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f1fc"/>
      <stop offset="1" stop-color="#fdeee8"/>
    </linearGradient>
    <linearGradient id="dot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c6fc9"/>
      <stop offset="1" stop-color="#f4a98f"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="30" flood-color="#4e4282" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1050" cy="90" r="220" fill="#efeafb" opacity="0.7"/>
  <circle cx="120" cy="560" r="180" fill="#fdeee8" opacity="0.8"/>

  <g font-family="Quicksand, Nunito, Arial, sans-serif">
    <g transform="translate(96,150)">
      <circle cx="22" cy="22" r="22" fill="url(#dot)"/>
      <text x="62" y="36" font-size="46" font-weight="700" fill="#2e2a3f">Duska</text>
    </g>
    <text x="96" y="320" font-size="76" font-weight="700" fill="#2e2a3f">Une parole douce</text>
    <text x="96" y="408" font-size="76" font-weight="700" fill="#2e2a3f">pour chaque humeur.</text>
    <text x="96" y="478" font-size="34" font-weight="600" fill="#5c5670">Affirmations &amp; citations par humeur — confiance, gratitude, énergie, sérénité.</text>
  </g>

  <g transform="translate(150,520)" font-family="Quicksand, Arial, sans-serif" font-weight="700" font-size="26" fill="#2e2a3f">
    <g transform="translate(0,0)"><rect x="-26" y="-30" width="180" height="46" rx="23" fill="#b7aee8"/><text x="-8" y="0">Confiance</text></g>
    <g transform="translate(180,0)"><rect x="-18" y="-30" width="170" height="46" rx="23" fill="#f4b9c7"/><text x="0" y="0">Gratitude</text></g>
    <g transform="translate(352,0)"><rect x="-18" y="-30" width="150" height="46" rx="23" fill="#f8cba0"/><text x="0" y="0">Énergie</text></g>
    <g transform="translate(504,0)"><rect x="-18" y="-30" width="160" height="46" rx="23" fill="#aedcd6"/><text x="0" y="0">Sérénité</text></g>
  </g>
</svg>
